<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #000000;
  --surface:    #0c0c0c;
  --surface2:   #111111;
  --surface3:   #1c1c1c;
  --border:     #1f1f1f;
  --border2:    #1f1f1f;
  --text:       #DBDEE1;
  --text2:      #B5BAC1;
  --muted:      #80848E;
  --accent:     #7c3aed;
  --accent-h:   #6d28d9;
  --accent-dim: rgba(124,58,237,.15);
  --accent-glow:rgba(124,58,237,.4);
  --green:      #23A559;
  --red:        #F23F43;
  --yellow:     #f0b840;
  --sidebar:    240px;
  --srv-bar:    58px;
  --radius-sm:  4px;
  --radius:     8px;
  --radius-lg:  12px;
  --shadow:     0 4px 20px rgba(0,0,0,.5);
  --shadow-lg:  0 8px 40px rgba(0,0,0,.6);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBAR GLOBAL ── */
* { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── AUTH ── */
#auth {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,.12) 0%, transparent 70%), var(--bg);
  z-index: 99;
  transition: transform .7s cubic-bezier(.86,0,.07,1), opacity .6s;
}
.auth-box {
  width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  box-shadow: var(--shadow-lg), 0 0 60px rgba(124,58,237,.08);
  animation: slideUp .5s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo .brand-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 16px;
  font-size: 24px; font-weight: 800; color: #fff;
  margin-bottom: 14px;
  box-shadow: 0 4px 20px var(--accent-glow);
  letter-spacing: -1px;
}
.auth-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.5px; }
.auth-logo p  { color: var(--text2); font-size: 13px; margin-top: 4px; }
.tabs {
  display: flex; gap: 3px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 20px;
}
.tab {
  flex: 1; padding: 7px;
  text-align: center;
  border-radius: 4px;
  cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--text2); border: none; background: none;
  transition: all .15s;
}
.tab.active { background: var(--surface3); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }
.auth-form { display: flex; flex-direction: column; gap: 10px; }
.auth-form input {
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text); font-size: 14px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.auth-form input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.auth-form input::placeholder { color: var(--muted); }
.auth-form input.hidden { display: none; }
.auth-err { color: var(--red); font-size: 12px; text-align: center; min-height: 16px; }
.btn-primary {
  padding: 10px 16px;
  background: var(--accent);
  color: #fff; border: none;
  border-radius: var(--radius);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s, box-shadow .15s;
  margin-top: 4px;
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-h);
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:active:not(:disabled) { transform: scale(.98); }
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }

/* ── LAYOUT ── */
#app { display: none; height: 100vh; width: 100vw; flex-direction: row; overflow: hidden; opacity: 0; transform: scale(1.04); transition: opacity .6s ease, transform .6s cubic-bezier(.19,1,.22,1); }
#app.on { display: flex; }
#app.visible { opacity: 1; transform: scale(1); }

/* ── SERVER BAR ── */
.srv-bar {
  width: var(--srv-bar); min-width: var(--srv-bar); max-width: var(--srv-bar);
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 0; gap: 4px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  height: 100vh;
  position: relative;
}
.srv-bar::-webkit-scrollbar { width: 0; }
.srv-bar { scrollbar-width: none; }
.srv-icon {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff;
  cursor: pointer;
  transition: border-radius .25s cubic-bezier(.4,0,.2,1), background .15s, box-shadow .15s;
  position: relative;
  flex-shrink: 0;
}
.srv-icon::before {
  content: '';
  position: absolute; left: -8px; top: 50%; transform: translateY(-50%) scale(0);
  width: 4px; height: 8px;
  background: var(--text); border-radius: 0 4px 4px 0;
  transition: height .2s ease, transform .2s ease;
}
.srv-icon:hover::before { height: 20px; transform: translateY(-50%) scale(1); }
.srv-icon.active::before { height: 40px; transform: translateY(-50%) scale(1); }
.srv-icon:hover { border-radius: 14px; }
.srv-icon.active {
  border-radius: 14px;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.srv-sep { width: 28px; height: 1px; background: var(--border); margin: 4px 0; flex-shrink: 0; }
.srv-add {
  background: var(--surface2);
  color: var(--green); font-size: 20px; font-weight: 300;
}
.srv-add:hover { background: var(--green); color: #fff; border-radius: 14px; }
.srv-icon .unread-pip {
  position: absolute; bottom: 1px; right: 1px;
  width: 9px; height: 9px;
  border-radius: 50%; background: var(--red);
  border: 2px solid var(--bg);
  font-size: 0;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar); min-width: var(--sidebar); max-width: var(--sidebar);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh;
  flex-shrink: 0;
  position: relative;
}
.s-head {
  padding: 13px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.s-head .logo {
  font-size: 15px; font-weight: 700;
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: -.3px;
}
.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red); flex-shrink: 0;
  transition: background .4s;
}
.conn-dot.on { background: var(--green); }
.s-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 0; }
.s-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .02em;
  color: var(--muted);
  padding: 16px 8px 4px 8px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
}
.s-label:hover { color: var(--text2); }
.s-label-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 14px; line-height: 1;
  padding: 0 2px; border-radius: 3px;
  transition: color .1s;
}
.s-label-btn:hover { color: var(--text); }
.s-item {
  display: flex; align-items: center; gap: 6px;
  padding: 0 8px; margin: 1px 8px;
  transition: background .1s, color .1s;
  height: 32px; border-radius: 4px;
  cursor: pointer; font-size: 15px;
  color: var(--text2);
  transition: background .05s, color .05s;
  position: relative;
  white-space: nowrap; overflow: hidden;
}
.s-item:hover { background: var(--surface3); color: var(--text); transform: translateX(3px); }
.s-item.active { background: var(--surface3); color: var(--text); transform: translateX(3px); }
.s-item .ico { font-size: 18px; color: var(--muted); flex-shrink: 0; }
.s-item .badge {
  margin-left: auto;
  background: var(--red); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: 10px;
  min-width: 18px; text-align: center;
}
.s-item .name { flex: 1; font-size: 15px; overflow: hidden; text-overflow: ellipsis; }
.u-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px; margin: 0 6px;
  border-radius: var(--radius-sm);
  cursor: pointer; transition: background .1s;
}
.u-item:hover { background: var(--surface2); }
.u-av {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
  flex-shrink: 0; position: relative;
}
.u-av .dot {
  position: absolute; bottom: -1px; right: -1px;
  width: 7px; height: 7px;
  border-radius: 50%; background: var(--green);
  border: 2px solid var(--surface);
}
.u-name { font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.kick-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 11px;
  padding: 2px 5px; border-radius: 4px;
  opacity: 0; transition: all .1s; flex-shrink: 0;
}
.u-item:hover .kick-btn { opacity: 1; }
.kick-btn:hover { color: var(--red); background: rgba(240,64,96,.1); }

/* ── VOICE VIEW (main) ── */
.voice-view {
  flex: 1; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg); gap: 40px; padding: 48px 32px; overflow-y: auto; display: none;
}
.vv-cards { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 720px; }
.vv-card {
  width: 136px; height: 100px; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  background: var(--surface3); position: relative; overflow: hidden;
}
.vv-card-av {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
}
.vv-card-name { font-size: 12px; font-weight: 600; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.vv-card-mute { position: absolute; bottom: 6px; right: 6px; font-size: 11px; color: var(--red); }
.vv-card.speaking .vv-card-av { box-shadow: 0 0 0 3px var(--green); }
.vv-card.speaking { background: rgba(35,165,89,.1); }
.v-user.speaking { color: var(--text); }
.v-user.speaking .v-av { box-shadow: 0 0 0 2px var(--green); }
#vv-screen-container { width: 100%; max-width: 860px; display: flex; flex-direction: column; gap: 8px; }
#vv-screen-container video { width: 100%; border-radius: 8px; background: #000; max-height: 480px; }
.screen-share-label { font-size: 11px; color: var(--muted); text-align: center; margin-top: -4px; }
.vv-info { display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
.vv-channel-name { font-size: 24px; font-weight: 700; color: var(--text); }
.vv-channel-sub { font-size: 14px; color: var(--muted); }
.vv-join-btn {
  background: var(--green); color: #fff; border: none;
  padding: 12px 36px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: .2px;
  transition: filter .1s;
}
.vv-join-btn:hover { filter: brightness(1.1); }
.vv-join-btn.leave { background: var(--red); }
.vv-ctrl { display: flex; gap: 8px; }

/* ── VOICE BAR ── */
.voice-bar { border-top: 1px solid var(--border); padding: 6px 0; flex-shrink: 0; }
.s-item .voice-join-pill {
  flex-shrink: 0; font-size: 9px; font-weight: 800; letter-spacing: .3px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid rgba(124,58,237,.3);
  border-radius: 3px; padding: 2px 6px;
  opacity: 0; transition: opacity .15s; pointer-events: none;
}
.s-item:hover .voice-join-pill { opacity: 1; }
.s-item.active .voice-join-pill { background: rgba(16,217,126,.1); color: var(--green); border-color: rgba(16,217,126,.3); opacity: 1; }
.invite-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid rgba(124,58,237,.25);
  padding: 5px 12px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.invite-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 12px var(--accent-glow); }
.v-users { display: flex; flex-direction: column; gap: 2px; }
.v-user { display: flex; align-items: center; gap: 6px; padding: 2px 4px; font-size: 12px; color: var(--text2); }
.v-av {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: #fff; flex-shrink: 0;
}

/* ── SELF BAR ── */
.self-bar {
  height: 52px; min-height: 52px;
  padding: 0 8px;
  display: flex; align-items: center; gap: 2px;
  flex-shrink: 0;
  background: var(--surface2);
  border-top: none;
  margin-top: auto;
}
.self-av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.self-info { flex: 1; padding: 0 6px; min-width: 0; overflow: hidden; }
.self-name { font-size: 13px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
.self-status-voice { font-size: 11px; color: var(--green); display: block; }
.self-voice-btn {
  width: 32px; height: 32px; background: none; border: none;
  color: var(--text2); cursor: pointer; font-size: 18px;
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  transition: background .1s, color .1s; flex-shrink: 0;
}
.self-voice-btn:hover { background: var(--surface3); color: var(--text); }
.self-voice-btn.muted { color: var(--red); }
.self-voice-btn.disabled { opacity: .35; cursor: default; }
.logout-btn {
  width: 32px; height: 32px; background: none; border: none;
  color: var(--muted); cursor: pointer; font-size: 18px;
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  transition: background .1s, color .1s;
}
.logout-btn:hover { background: var(--surface3); color: var(--red); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; background: var(--bg); overflow: hidden; position: relative; }
.scroll-fab {
  position: absolute; bottom: 90px; right: 20px; z-index: 10;
  background: var(--accent); color: #fff; border: none;
  border-radius: 20px; padding: 6px 16px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  box-shadow: 0 2px 14px var(--accent-glow);
  transition: opacity .2s, transform .2s;
}
.scroll-fab:hover { background: var(--accent-h); transform: translateY(-2px); }
.msg-link { color: #a78bfa; text-decoration: underline; text-underline-offset: 2px; word-break: break-all; }
.msg-link:hover { color: var(--accent); }
.chat-head {
  height: 48px; padding: 0 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
  background: var(--bg);
}
.chat-head .ch-ico { font-size: 22px; color: var(--muted); flex-shrink: 0; }
.chat-head .ch-name { font-size: 15px; font-weight: 700; color: var(--text); }
.chat-head .ch-sub {
  font-size: 13px; color: var(--text2);
  padding-left: 8px; border-left: 1px solid var(--border); margin-left: 4px;
}
.ch-actions { margin-left: auto; display: flex; gap: 6px; }
.ch-actions button {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 5px 11px;
  border-radius: var(--radius-sm); font-size: 12px;
  cursor: pointer; transition: all .15s;
}
.ch-actions button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── MESSAGES ── */
#msgs { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 0; }
.msg {
  display: flex; flex-direction: column;
  padding: 2px 16px; border-radius: 0;
  transition: background .05s; position: relative;
  animation: msgIn .25s cubic-bezier(.23,1,.32,1) backwards;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: translateX(0); }
}
.msg:hover { background: rgba(255,255,255,.04); }
.msg .m-head { display: flex; align-items: baseline; gap: 7px; margin-bottom: 1px; }
.msg .m-user { font-size: 15px; font-weight: 600; cursor: pointer; }
.msg .m-time { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 400; }
.msg .m-body {
  font-size: 15px; line-height: 1.375; color: var(--text);
  word-break: break-word; white-space: pre-wrap;
}
.msg .m-edited { font-size: 10px; color: var(--muted); }
.msg .m-reply {
  font-size: 12px; color: var(--text2);
  padding: 3px 10px; margin-bottom: 4px;
  border-left: 2px solid var(--accent);
  background: var(--accent-dim);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.msg .m-del { font-style: italic; color: var(--muted); font-size: 12px; }
.msg-actions {
  display: none; position: absolute; right: 8px; top: -14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden; z-index: 5;
  box-shadow: 0 4px 12px rgba(0,0,0,.6);
  gap: 2px; padding: 2px;
}
.msg:hover .msg-actions { display: flex; }
.msg-actions button {
  background: none; border: none; color: var(--text2);
  padding: 5px 8px; cursor: pointer; font-size: 13px;
  border-radius: 4px;
  transition: background .1s, color .1s;
}
.msg-actions button:hover { background: var(--surface2); color: var(--text); }

/* ── INPUT ── */
.input-wrap { padding: 12px 18px 16px; flex-shrink: 0; position: relative; }
.reply-strip {
  display: none; padding: 6px 12px; margin-bottom: 6px;
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 12px; color: var(--text2);
  align-items: center; gap: 6px;
}
.reply-strip.on { display: flex; }
.reply-strip .r-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
.input-box {
  display: flex; align-items: center; gap: 0;
  background: var(--surface3); border-radius: 8px;
  padding: 0 16px; min-height: 44px;
}
.input-box textarea {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 15px; line-height: 1.375;
  padding: 11px 0; resize: none; max-height: 50vh;
  font-family: inherit;
}
.input-box textarea::placeholder { color: var(--muted); }
.send-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm);
  padding: 6px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background .15s, box-shadow .15s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-h); box-shadow: 0 2px 10px var(--accent-glow); }
#typing-indicator { font-size: 12px; color: var(--text2); padding: 3px 2px; min-height: 18px; }

/* ── MODALS ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px);
  z-index: 50; display: none;
  align-items: center; justify-content: center;
}
.modal-bg.on { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 26px;
  width: 400px; max-width: 92vw; max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modal-pop .15s cubic-bezier(.4,0,.2,1);
}
@keyframes modal-pop {
  from { opacity: 0; transform: scale(.96) translateY(-6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.modal input, .modal select {
  width: 100%; padding: 10px 13px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text); font-size: 14px; font-family: inherit;
  outline: none; margin-bottom: 10px;
  transition: border-color .15s, box-shadow .15s;
}
.modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.modal select { appearance: none; cursor: pointer; }
.modal .btns { display: flex; gap: 8px; margin-top: 8px; }
.modal .btns button { flex: 1; }
.btn-cancel {
  padding: 10px; background: var(--surface2);
  border: 1px solid var(--border); color: var(--text2);
  border-radius: var(--radius); font-size: 13px; cursor: pointer;
  transition: background .15s, color .15s;
}
.btn-cancel:hover { background: var(--surface3); color: var(--text); }

/* ── ADMIN ── */
.admin-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.admin-tab {
  padding: 6px 14px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 12px; font-weight: 600;
  background: var(--surface2); color: var(--text2);
  border: none; transition: all .1s;
}
.admin-tab.active { background: var(--accent); color: #fff; }
.admin-tab .count {
  background: var(--red); color: #fff;
  font-size: 9px; padding: 1px 4px; border-radius: 8px; margin-left: 4px;
}
.admin-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 13px;
}
.admin-row:last-child { border-bottom: none; }
.admin-row .name { flex: 1; font-weight: 500; }
.admin-row .role-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
.admin-row button {
  padding: 4px 10px; border-radius: var(--radius-sm);
  font-size: 11px; cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  transition: all .1s;
}
.admin-row button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.admin-row button.danger { color: var(--red); }
.admin-row button.danger:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* ── TOAST ── */
#toast {
  position: fixed; top: 18px; right: 18px;
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 18px; border-radius: var(--radius);
  font-size: 13px; z-index: 60;
  transform: translateY(-12px) translateX(8px); opacity: 0;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  box-shadow: var(--shadow);
}
#toast.on { transform: translateY(0) translateX(0); opacity: 1; }

/* ── MESSAGE GROUPING ── */
.msg.grouped { padding-top: 0; }
.msg.grouped .m-head { display: none; }
.msg .m-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
  flex-shrink: 0; cursor: pointer; margin-top: 2px;
}
.msg.grouped .m-avatar { visibility: hidden; }
.msg .m-content { flex: 1; min-width: 0; }
.msg .m-row { display: flex; align-items: flex-start; gap: 16px; width: 100%; }
.msg.grouped:hover .m-time-hover { display: inline; }
.m-time-hover { display: none; font-size: 10px; color: var(--muted); position: absolute; left: 20px; top: 4px; }

/* ── REACTIONS ── */
.msg-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.reaction-pill {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; font-size: 12px; transition: all .15s;
}
.reaction-pill:hover { border-color: var(--accent); background: var(--accent-dim); }
.reaction-pill.mine { background: var(--accent-dim); border-color: var(--accent); }
.reaction-pill .r-count { font-size: 11px; color: var(--text2); }
.emoji-picker {
  position: absolute; bottom: 100%; right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 4px; z-index: 20;
  box-shadow: var(--shadow);
}
.emoji-picker button {
  background: none; border: none; font-size: 18px;
  cursor: pointer; padding: 4px;
  border-radius: var(--radius-sm); transition: background .1s;
}
.emoji-picker button:hover { background: var(--surface2); }

/* ── MENTIONS ── */
.mention { color: var(--accent); background: var(--accent-dim); padding: 0 3px; border-radius: 3px; cursor: pointer; }
.msg.mentioned { background: rgba(124,58,237,.07); border-left: 2px solid var(--accent); }
.mention-autocomplete {
  position: absolute; bottom: 100%; left: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); max-height: 200px; overflow-y: auto;
  z-index: 20; min-width: 200px;
  box-shadow: var(--shadow);
}
.mention-autocomplete .ma-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
.mention-autocomplete .ma-item:hover,
.mention-autocomplete .ma-item.selected { background: var(--surface2); }

/* ── SEARCH ── */
.search-panel {
  position: absolute; top: 48px; right: 0;
  width: 400px; max-width: 100%;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
  max-height: 60vh; overflow-y: auto;
  z-index: 15; display: none;
  box-shadow: var(--shadow);
}
.search-panel.on { display: block; }
.search-panel .s-input {
  width: 100%; padding: 11px 14px;
  background: var(--surface2); border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 14px; font-family: inherit; outline: none;
}
.search-result { padding: 9px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.search-result:hover { background: var(--surface2); }
.search-result .sr-user { font-size: 12px; font-weight: 600; }
.search-result .sr-text { font-size: 13px; color: var(--text2); margin-top: 2px; }
.search-result .sr-time { font-size: 10px; color: var(--muted); }

/* ── FILE UPLOAD ── */
.upload-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; flex-shrink: 0;
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text2);
  cursor: pointer; font-size: 15px;
  transition: all .15s;
}
.upload-btn:hover { background: var(--accent-dim); border-color: rgba(124,58,237,.3); color: var(--accent); }
.msg-attachment { margin-top: 6px; }
.msg-img-preview { max-width: 320px; max-height: 260px; border-radius: var(--radius); cursor: pointer; transition: opacity .2s; }
.msg-img-preview:hover { opacity: .85; }
.msg-file-link {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--accent);
  font-size: 13px; text-decoration: none; transition: all .15s;
}
.msg-file-link:hover { background: var(--surface3); }
.upload-progress { padding: 4px 8px; font-size: 12px; color: var(--text2); }
.drop-overlay {
  position: fixed; inset: 0;
  background: rgba(124,58,237,.12);
  border: 2px dashed var(--accent);
  z-index: 100; display: none;
  align-items: center; justify-content: center;
  font-size: 18px; color: var(--accent); font-weight: 600;
  backdrop-filter: blur(4px);
}
.drop-overlay.on { display: flex; }

/* ── VOICE CONTROLS ── */
.voice-controls { display: flex; gap: 4px; padding: 4px 8px 2px; }
.voice-ctrl-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); width: 28px; height: 28px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.voice-ctrl-btn:hover { background: var(--surface3); }
.voice-ctrl-btn.active { background: rgba(240,64,96,.12); color: var(--red); border-color: rgba(240,64,96,.4); }
.v-user .v-muted { color: var(--red); font-size: 10px; margin-left: auto; }

/* ── SOUND TOGGLE ── */
.sound-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 14px; padding: 4px;
  border-radius: 4px; transition: color .15s;
}
.sound-btn:hover { color: var(--text); }

/* ── IMAGE FULLSCREEN ── */
.img-fullscreen {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.88); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(6px);
}
.img-fullscreen img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: var(--radius); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .srv-bar { width: 48px; min-width: 48px; }
  .sidebar { width: 200px; min-width: 200px; }
  .srv-icon { width: 36px; height: 36px; font-size: 14px; }
  .search-panel { width: 100%; }
}
@media (max-width: 600px) {
  #app { flex-direction: column; }
  .srv-bar {
    width: 100%; min-width: 100%; max-width: 100%; height: 48px;
    flex-direction: row; overflow-x: auto; overflow-y: hidden;
    border-right: none; border-bottom: 1px solid var(--border);
    padding: 4px 8px; order: -1;
  }
  .srv-sep { width: 1px; height: 28px; margin: 0 4px; }
  .srv-icon { width: 36px; height: 36px; font-size: 14px; }
  .srv-icon.active::before { display: none; }
  .sidebar { width: 85%; max-width: 320px; position: fixed; z-index: 11; left: -100%; transition: left .2s; top: 48px; bottom: 0; }
  .sidebar.open { left: 0; }
  .mob-toggle { display: block !important; }
  .search-panel { width: 100%; }
  .mob-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 10; }
  .mob-overlay.on { display: block; }
  .sidebar .s-head { display: flex; justify-content: space-between; }
  .mob-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 4px; }
}
.mob-toggle { display: none; background: none; border: none; color: var(--text); font-size: 18px; cursor: pointer; padding: 4px; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="brand-mark">R</div>
      <h1>Realm</h1>
      <p>Chat priv&eacute; &mdash; 100% auto-h&eacute;berg&eacute;</p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('login')">Connexion</button>
      <button class="tab" onclick="setTab('register')">Inscription</button>
    </div>
    <form class="auth-form" onsubmit="return doAuth(event)">
      <input name="username" placeholder="Nom d'utilisateur" required autocomplete="username">
      <input name="email" type="email" placeholder="Email (optionnel)" class="hidden" autocomplete="email">
      <input name="password" type="password" placeholder="Mot de passe" required autocomplete="current-password">
      <input name="totp_code" id="totp-field" placeholder="Code 2FA (6 chiffres)" maxlength="6" pattern="[0-9]{6}" style="display:none" autocomplete="one-time-code">
      <div class="auth-err" id="auth-err"></div>
      <button type="submit" class="btn-primary" id="auth-btn">Connexion</button>
    </form>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modal-2fa" onclick="if(event.target===this)closeModal('modal-2fa')">
  <div class="modal">
    <h3>S&eacute;curit&eacute; 2FA</h3>
    <div id="twofa-content"></div>
    <div class="btns" id="twofa-btns"></div>
  </div>
</div>

<div class="modal-bg" id="modal-create-server" onclick="if(event.target===this)closeModal('modal-create-server')">
  <div class="modal">
    <h3>Cr&eacute;er un serveur</h3>
    <input id="inp-server-name" placeholder="Nom du serveur" maxlength="30">
    <div class="btns">
      <button class="btn-cancel" onclick="closeModal('modal-create-server')">Annuler</button>
      <button class="btn-primary" onclick="createServer()">Cr&eacute;er</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-join-server" onclick="if(event.target===this)closeModal('modal-join-server')">
  <div class="modal">
    <h3>Rejoindre un serveur</h3>
    <input id="inp-join-code" placeholder="Code d'invitation" maxlength="20">
    <div class="btns">
      <button class="btn-cancel" onclick="closeModal('modal-join-server')">Annuler</button>
      <button class="btn-primary" onclick="joinServer()">Rejoindre</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-invite" onclick="if(event.target===this)closeModal('modal-invite')">
  <div class="modal">
    <h3>Code d'invitation</h3>
    <input id="invite-code" readonly onclick="this.select()">
    <div class="btns">
      <button class="btn-primary" onclick="copyInvite()">Copier</button>
      <button class="btn-cancel" onclick="closeModal('modal-invite')">Fermer</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-create-channel" onclick="if(event.target===this)closeModal('modal-create-channel')">
  <div class="modal">
    <h3>Cr&eacute;er un channel</h3>
    <input id="inp-channel-name" placeholder="Nom du channel" maxlength="30">
    <select id="inp-channel-type">
      <option value="text">Texte</option>
      <option value="voice">Vocal</option>
    </select>
    <div class="btns">
      <button class="btn-cancel" onclick="closeModal('modal-create-channel')">Annuler</button>
      <button class="btn-primary" onclick="createChannel()">Cr&eacute;er</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-admin" onclick="if(event.target===this)closeModal('modal-admin')">
  <div class="modal" style="width:500px">
    <h3>Administration</h3>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="adminTab('users')">Utilisateurs</button>
      <button class="admin-tab" onclick="adminTab('servers')">Serveurs</button>
    </div>
    <div id="admin-content"></div>
  </div>
</div>

<div id="toast"></div>

<!-- Drop overlay for file upload -->
<div class="drop-overlay" id="drop-overlay">D&eacute;poser le fichier ici</div>

<!-- APP -->
<div class="mob-overlay" id="mob-overlay" onclick="closeMobileSidebar()"></div>
<div id="app">
  <!-- Server bar (far left) -->
  <div class="srv-bar" id="srv-bar">
    <div class="srv-icon active" style="background:linear-gradient(135deg,var(--accent),#a855f7);border-radius:16px;width:44px;height:44px;font-size:18px;font-weight:800" onclick="goHome()" title="Messages priv&eacute;s" id="srv-global">R</div>
    <div class="srv-sep"></div>
    <div id="srv-list"></div>
    <div class="srv-icon srv-add" onclick="openModal('modal-create-server')" title="Cr&eacute;er un serveur">+</div>
    <div class="srv-icon" style="background:var(--surface2);color:var(--green);font-size:14px" onclick="openModal('modal-join-server')" title="Rejoindre un serveur">&#8599;</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="s-head">
      <span class="logo" id="sidebar-title" style="color:var(--accent)">Realm</span>
      <div class="conn-dot" id="dot"></div>
    </div>
    <div class="s-scroll" id="s-scroll"></div>
    <div id="admin-bar" style="display:none;padding:6px 8px;border-top:1px solid var(--border)">
      <button onclick="openAdmin()" style="width:100%;padding:7px 10px;background:rgba(242,63,67,.12);border:1px solid rgba(242,63,67,.3);color:var(--red);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;text-align:left">&#x1F6E1; Panneau Admin</button>
    </div>
    <div class="voice-bar" id="voice-bar" style="display:none">
      <div class="s-label" id="voice-label">Vocal global</div>
      <div class="s-item" id="voice-channel-item" onclick="openGlobalVoice()">
        <span class="ico">&#x1f50a;</span>
        <span class="name">G&eacute;n&eacute;ral</span>
        <span class="voice-join-pill" id="voice-btn"></span>
      </div>
      <div class="v-users" id="voice-users"></div>
    </div>
    <div class="self-bar" id="self-bar"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="chat-head">
      <button class="mob-toggle" onclick="toggleMobileSidebar()">&#9776;</button>
      <span class="ch-ico" id="ch-ico">#</span>
      <span class="ch-name" id="ch-name">Lobby</span>
      <span class="ch-sub" id="ch-sub">Chat global</span>
      <div class="ch-actions" id="ch-actions"></div>
    </div>
    <!-- Search panel -->
    <div class="search-panel" id="search-panel">
      <input class="s-input" id="search-input" placeholder="Rechercher des messages..." oninput="doSearch(this.value)">
      <div id="search-results"></div>
    </div>
    <!-- Voice View -->
    <div class="voice-view" id="voice-view">
      <div id="vv-screen-container"></div>
      <div class="vv-cards" id="vv-cards"></div>
      <div class="vv-info">
        <div class="vv-channel-name" id="vv-channel-name">G&eacute;n&eacute;ral</div>
        <div class="vv-channel-sub" id="vv-channel-sub">Personne en vocal</div>
        <button class="vv-join-btn" id="vv-join-btn" onclick="voiceViewJoin()">Rejoindre</button>
        <div class="vv-ctrl" id="vv-ctrl" style="display:none"></div>
      </div>
    </div>
    <!-- Chat Area -->
    <div id="chat-area" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
    <div id="msgs"></div>
    <button class="scroll-fab" id="scroll-fab" style="display:none" onclick="scrollBot()">&#x2193; Nouveau</button>
    <div id="typing-indicator"></div>
    <div class="input-wrap">
      <div class="reply-strip" id="reply-strip">
        <span id="reply-text"></span>
        <button class="r-close" onclick="cancelReply()">&times;</button>
      </div>
      <!-- Mention autocomplete -->
      <div class="mention-autocomplete" id="mention-ac" style="display:none"></div>
      <div class="input-box">
        <button class="upload-btn" onclick="$('file-input').click()" title="Joindre un fichier">&#x1F4CE;</button>
        <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(this)" multiple>
        <textarea id="inp" rows="1" placeholder="Envoyer un message..." oninput="onInp(this);onMentionInput(this)" onkeydown="onKey(event)"></textarea>
        <button class="send-btn" onclick="send()">Envoyer</button>
      </div>
      <div class="upload-progress" id="upload-progress" style="display:none"></div>
    </div>
    </div><!-- /#chat-area -->
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── STATE ────────────────────────────────────────────────────
let me = null, sock = null;
let view = 'global'; // 'global' | 'dm:username' | 'server:id:channelId'
let authMode = 'login';
let servers = [], serverChannels = {}; // serverId → [channels]
let onlineList = [], myRole = 'user';
let globalMsgs = [], globalLastId = 0;
let dmMsgs = {}, dmUnread = {};
let serverMsgs = {}, serverLastId = {}; // channelId → msgs, channelId → lastId
let typingUsers = new Set(), typingTimer = {};
let replyTo = null;

// Voice
let inVoice = false, voiceChannelId = null;
let voiceCapture = null; // { stream, audioCtx, processor, src, compressor }
let voicePlayCtx = null, voiceNextTime = {};
let speakingUsers = {}; // username → timeout id
let sharingScreen = false, screenCapture = null;
let screenPlayers = {}; // username → { ms, sb, queue, appending, video }

// Mute/Deafen
let isMuted = false, isDeafened = false;
let voiceMuteStates = {}; // username → {muted, deafened}

// Unread
let unreadCounts = {}; // context key → count

// Sound
let soundEnabled = localStorage.getItem('realm_sound') !== 'false';
let audioCtx = null;
let windowFocused = true;

// Search
let searchTimeout = null;

// Mention autocomplete
let mentionActive = false;
let mentionStart = -1;
let mentionSelectedIdx = 0;
let mentionMatches = [];

// Reactions - common emojis
const EMOJI_LIST = [
  '\u{1F44D}','\u{1F44E}','\u{2764}\uFE0F','\u{1F602}','\u{1F60D}','\u{1F62E}',
  '\u{1F622}','\u{1F621}','\u{1F525}','\u{1F389}','\u{1F44F}','\u{1F914}',
  '\u{1F4AF}','\u{2705}','\u{274C}','\u{1F440}','\u{1F680}','\u{2B50}',
  '\u{1F60E}','\u{1F64F}','\u{1F49C}','\u{1F31F}','\u{1F4A1}','\u{1F60A}'
];


// ── UTIL ─────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function x(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function safeColor(c) { return /^#[0-9a-f]{6}$/i.test(c) ? c : '#7c3aed'; }
function showToast(msg, dur=3000) { const t=$('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), dur); }
function openModal(id) { $(id).classList.add('on'); }
function closeModal(id) { $(id).classList.remove('on'); }
function setDot(on) { $('dot').classList.toggle('on', on); }
let _newMsgCount = 0;
function isNearBottom() { const el=$('msgs'); return el.scrollHeight - el.scrollTop - el.clientHeight < 150; }
function updateScrollFab() {
  const fab = $('scroll-fab');
  if (!isNearBottom()) {
    fab.style.display = '';
    fab.textContent = _newMsgCount > 0 ? `↓ ${_newMsgCount} nouveau${_newMsgCount>1?'x':''}` : '↓';
  } else {
    _newMsgCount = 0; fab.style.display = 'none';
  }
}

// ── AUDIO / NOTIFICATION SOUNDS ──────────────────────────────
function initAudio() {
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
}

function playSound(type) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.value = 0.15;

    if (type === 'message') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.25);
    } else if (type === 'join') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'leave') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(900, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.25);
    }
  } catch {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('realm_sound', soundEnabled);
  if (soundEnabled && !audioCtx) initAudio();
  renderSelfBar();
}

function setTab(t) {
  authMode = t;
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', i===(t==='login'?0:1)));
  const em = document.querySelector('.auth-form input[name=email]');
  em.classList.toggle('hidden', t==='login');
  $('auth-btn').textContent = t==='login' ? 'Connexion' : 'Inscription';
  $('auth-err').textContent = '';
}

async function doAuth(e) {
  e.preventDefault();
  const f = new FormData(e.target);
  const body = { username: f.get('username'), password: f.get('password') };
  if (authMode==='register') body.email = f.get('email') || undefined;
  const totpVal = f.get('totp_code');
  if (totpVal) body.totp_code = totpVal;
  $('auth-btn').disabled = true;
  try {
    const r = await fetch(`/auth/${authMode}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const d = await r.json();
    if (d.requires_2fa) {
      $('totp-field').style.display = '';
      $('totp-field').required = true;
      $('totp-field').focus();
      $('auth-err').textContent = 'Entrez votre code 2FA';
      return;
    }
    if (!r.ok) throw new Error(d.error||'Erreur');
    me = d;
    hideAuth();
    boot();
  } catch(err) {
    $('auth-err').textContent = err.message;
  } finally { $('auth-btn').disabled = false; }
}

async function checkSession() {
  try {
    const r = await fetch('/auth/me');
    if (!r.ok) return;
    me = await r.json();
    hideAuth();
    boot();
  } catch {}
}

async function doLogout() {
  try { await fetch('/auth/logout', { method:'POST' }); } catch {}
  location.reload();
}

// ── UNREAD COUNTS ────────────────────────────────────────────
async function loadUnreadCounts() {
  try {
    const r = await fetch('/api/unread-counts');
    if (r.ok) {
      const data = await r.json();
      if (data && typeof data === 'object') unreadCounts = data;
    }
  } catch {}
}

function updateReadPosition() {
  if (!sock) return;
  let context = null, lastMsgId = 0;
  if (view === 'global') {
    context = 'global';
    lastMsgId = globalLastId;
  } else if (view.match(/^server:\d+:\d+$/)) {
    const chId = getCurrentChannelId();
    context = `channel:${chId}`;
    lastMsgId = serverLastId[chId] || 0;
  }
  if (context && lastMsgId > 0) {
    sock.emit('update_read_position', { context, lastMsgId });
    unreadCounts[context] = 0;
  }
}

function incrementUnread(context) {
  unreadCounts[context] = (unreadCounts[context] || 0) + 1;
}

function getServerUnreadTotal(serverId) {
  const channels = serverChannels[serverId] || [];
  let total = 0;
  for (const ch of channels) {
    total += unreadCounts[`channel:${ch.id}`] || 0;
  }
  return total;
}

// ── SOCKET ───────────────────────────────────────────────────
function initSocket() {
  sock = io({ auth: {} }); // uses cookie
  sock.on('connect', () => {
    setDot(true);
    // Reset voice state on reconnect (server already cleaned up on disconnect)
    if (inVoice || voiceChannelId) {
      if (localStr) { localStr.getTracks().forEach(t => t.stop()); localStr = null; }
      Object.keys(peers).forEach(closePeer);
      inVoice = false; voiceChannelId = null; isMuted = false; isDeafened = false;
      renderSidebar();
    }
    // Join all server rooms on connect/reconnect
    for (const srv of servers) {
      sock.emit('join_server_room', { serverId: srv.id });
    }
  });
  sock.on('disconnect', () => setDot(false));

  // Online users
  sock.on('online_users', users => {
    onlineList = users;
    const myU = users.find(u => u.id === me.id);
    if (myU) myRole = myU.role;
    renderSidebar();
  });

  // Global messages
  sock.on('new_message', m => {
    globalMsgs.push(m);
    globalLastId = Math.max(globalLastId, m.id);
    if (view === 'global') {
      appendMsg(m);
      if (isNearBottom()) { scrollBot(); updateReadPosition(); }
      else { _newMsgCount++; updateScrollFab(); }
    } else {
      incrementUnread('global');
      renderSrvBar();
    }
    if (m.username !== me.username && !windowFocused) playSound('message');
    checkMention(m);
  });
  sock.on('message_edited', ({ id, content, edited_at }) => patchEdit('g', id, content, edited_at));
  sock.on('message_deleted', ({ id }) => patchDel('g', id));

  // PMs
  sock.on('private_message', pm => {
    const partner = pm.from_username === me.username ? pm.to_username : pm.from_username;
    if (!dmMsgs[partner]) dmMsgs[partner] = [];
    dmMsgs[partner].push(pm);
    if (view === `dm:${partner}`) {
      appendMsg(pm, true);
      if (isNearBottom()) scrollBot();
      else { _newMsgCount++; updateScrollFab(); }
      // Mark as read server-side for messages received while DM is open
      if (pm.from_username !== me.username) fetch(`/api/pm/${encodeURIComponent(partner)}/read`, { method: 'POST' }).catch(()=>{});
    } else {
      dmUnread[partner] = (dmUnread[partner]||0) + 1;
      renderSidebar();
    }
    if (pm.from_username !== me.username && view !== `dm:${partner}` && !windowFocused) {
      playSound('message');
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(pm.from_username, { body: pm.content.slice(0,100), icon: '/favicon.ico' });
      }
    }
  });
  sock.on('pm_error', ({ error }) => showToast(error));
  sock.on('pm_deleted', ({ id }) => patchDel('dm', id));

  // Server messages
  sock.on('server_new_message', m => {
    const key = m.channelId;
    if (!serverMsgs[key]) serverMsgs[key] = [];
    serverMsgs[key].push(m);
    serverLastId[key] = Math.max(serverLastId[key]||0, m.id);
    if (view === `server:${m.serverId}:${m.channelId}`) {
      appendMsg(m);
      if (isNearBottom()) { scrollBot(); updateReadPosition(); }
      else { _newMsgCount++; updateScrollFab(); }
    } else {
      incrementUnread(`channel:${key}`);
      renderSrvBar();
      renderSidebar();
    }
    if (m.username !== me.username && !windowFocused) playSound('message');
    checkMention(m);
  });
  sock.on('server_message_edited', ({ serverId, id, content, edited_at }) => {
    const chId = getCurrentChannelId();
    if (chId) patchEdit('s', id, content, edited_at);
  });
  sock.on('server_message_deleted', ({ serverId, id }) => {
    const chId = getCurrentChannelId();
    if (chId) patchDel('s', id);
  });

  // Channels
  sock.on('channel_created', ({ serverId, channel }) => {
    if (!serverChannels[serverId]) serverChannels[serverId] = [];
    serverChannels[serverId].push(channel);
    if (view.startsWith(`server:${serverId}`)) renderSidebar();
  });
  sock.on('channel_deleted', ({ serverId, channelId }) => {
    if (serverChannels[serverId]) {
      serverChannels[serverId] = serverChannels[serverId].filter(c => c.id !== channelId);
      if (view.startsWith(`server:${serverId}`)) renderSidebar();
    }
  });

  // Voice
  sock.on('voice_users', users => { renderGlobalVoice(users); });
  sock.on('server_voice_users', ({ serverId, channelId, users }) => renderServerVoice(serverId, channelId, users));
  sock.on('voice_peer_joined', () => playSound('join'));
  sock.on('voice_peer_left', () => playSound('leave'));
  sock.on('server_voice_peer_joined', () => playSound('join'));
  sock.on('server_voice_peer_left', () => playSound('leave'));
  sock.on('voice_chunk', ({ from, pcm }) => {
    playVoiceChunk(from, pcm);
    if (!speakingUsers[from]) markSpeaking(from, true);
    clearTimeout(speakingUsers[from]);
    speakingUsers[from] = setTimeout(() => { delete speakingUsers[from]; markSpeaking(from, false); }, 500);
  });
  sock.on('screen_chunk', ({ from, data }) => receiveScreenChunk(from, data));
  sock.on('screen_stopped', ({ from }) => stopScreenPlayer(from));

  // Mute/Deafen state relay
  sock.on('voice_mute_state', ({ socketId, username, muted }) => {
    if (!voiceMuteStates[username]) voiceMuteStates[username] = {};
    voiceMuteStates[username].muted = muted;
    renderSidebar();
  });
  sock.on('voice_deafen_state', ({ socketId, username, deafened }) => {
    if (!voiceMuteStates[username]) voiceMuteStates[username] = {};
    voiceMuteStates[username].deafened = deafened;
    renderSidebar();
  });

  // Reactions
  sock.on('reaction_updated', ({ messageId, reactions }) => {
    renderReactionsForMsg(messageId, reactions);
  });

  // Mention notification
  sock.on('mention_notification', ({ from, content, context }) => {
    showToast(`${from} vous a mentionn\u00e9 : ${content.slice(0,50)}`);
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(`${from} vous a mentionn\u00e9`, { body: content.slice(0,100), icon: '/favicon.ico' });
    }
  });

  // Typing
  sock.on('user_typing', ({ username: u, context }) => { if (context !== view) return; typingUsers.add(u); renderTyping(); clearTimeout(typingTimer[u]); typingTimer[u]=setTimeout(()=>{typingUsers.delete(u);renderTyping();},3000); });
  sock.on('user_stop_typing', ({ username: u, context }) => { if (context !== view) return; typingUsers.delete(u); renderTyping(); });

  // Kicked
  sock.on('kicked', ({ reason }) => { alert(reason); location.reload(); });
  sock.on('admin_alert', ({ message }) => { showToast('[ADMIN] ' + message, 10000); });

  // Request desktop notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

async function loadServers() {
  try {
    const r = await fetch('/api/servers'); servers = await r.json();
    for (const s of servers) {
      const cr = await fetch(`/api/servers/${s.id}/channels`);
      serverChannels[s.id] = await cr.json();
    }
  } catch {}
}

async function createServer() {
  const name = $('inp-server-name').value.trim();
  if (!name) return;
  try {
    const r = await fetch('/api/servers', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    servers.push(d);
    serverChannels[d.id] = d.channels || [];

    $('inp-server-name').value = '';

    if (textCh) openChannel(d.id, textCh.id);
    showToast('Serveur cr\u00e9\u00e9 !');
  } catch(e) { showToast(e.message); }
}

async function joinServer() {
  const code = $('inp-join-code').value.trim();
  if (!code) return;
  try {
    const r = await fetch('/api/servers/join', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code}) });
