<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm</title>
<style>
body { background:#09090b; color:#fafafa; font-family:system-ui; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
.box { text-align:center; padding:32px; }
h1 { color:#7c3aed; font-size:28px; }
p { color:#a1a1aa; font-size:14px; margin-top:8px; }
input { padding:10px; background:#18181b; border:1px solid #27272a; border-radius:8px; color:#fafafa; font-size:14px; width:250px; text-align:center; margin-top:16px; }
button { padding:10px 20px; background:#7c3aed; color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer; margin-top:10px; }
</style>
</head>
<body>
<div class="box">
  <h1>Realm</h1>
  <p>Entrez l'adresse du serveur Realm</p>
  <br>
  <input id="url" type="url" placeholder="https://realm.example.com" value="">
  <br>
  <button onclick="go()">Connecter</button>
  <p id="err" style="color:#ef4444"></p>
</div>
<script>
  var saved = localStorage.getItem('realm_server');
  if (saved) document.getElementById('url').value = saved;

  async function go() {
    var url = document.getElementById('url').value.trim().replace(/\/+$/, '');
    if (!url) return;
    try {
      var r = await fetch(url + '/api/info');
      if (!r.ok) throw new Error('Serveur non trouvé');
      localStorage.setItem('realm_server', url);
      window.location.href = url;
    } catch(e) {
      document.getElementById('err').textContent = 'Impossible de se connecter: ' + e.message;
    }
  }

  if (saved) go();
</script>
</body>
</html>
